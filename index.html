<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCsyaberu's Bedrock Edition PVP Rankings - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #0d0d12;
            --accent: #00d2ff;
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.4);
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --ht-grad: linear-gradient(135deg, #ff004c, #ff4b2b);
            --lt-grad: linear-gradient(135deg, #00f2fe, #4facfe);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid #222;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .logo-area {
            padding: 40px 30px;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: var(--neon-glow);
            letter-spacing: 2px;
            text-align: center;
        }

        .nav-btn {
            width: 100%;
            padding: 20px 30px;
            background: none;
            border: none;
            color: #666;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-btn.active {
            color: var(--accent);
            background: rgba(0, 210, 255, 0.1);
            border-left: 4px solid var(--accent);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }

        /* --- SETTINGS --- */
        .settings-area {
            margin-top: auto;
            padding: 30px;
            border-top: 1px solid #222;
        }
        .settings-label { font-size: 0.75rem; color: #555; margin-bottom: 10px; display: block; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .mute-toggle {
            background: none; border: 1px solid #333; color: #888;
            width: 100%; padding: 8px; margin-top: 15px; border-radius: 5px; cursor: pointer;
        }
        .mute-toggle.active { color: var(--accent); border-color: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-container {
            margin-left: 280px;
            padding: 60px;
            flex-grow: 1;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 { font-size: 2.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }

        /* --- RANKING CARDS --- */
        .ranking-list { display: flex; flex-direction: column; gap: 15px; }

        .player-card {
            background: var(--panel);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .player-card:hover {
            transform: translateX(10px);
            border-color: var(--accent);
            box-shadow: var(--neon-glow);
        }

        .top-1 { border: 2px solid var(--gold); background: linear-gradient(90deg, #1a1600, #0d0d12); }
        .top-2 { border: 1.5px solid var(--silver); }
        .top-3 { border: 1.5px solid var(--bronze); }

        .rank-number {
            font-size: 2rem;
            font-weight: 900;
            width: 70px;
            color: #333;
        }
        .top-1 .rank-number { color: var(--gold); }
        .top-2 .rank-number { color: var(--silver); }
        .top-3 .rank-number { color: var(--bronze); }

        .crown-icon {
            position: absolute;
            top: -12px; left: 15px;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(255,204,0,0.5));
        }

        .profile-box {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 320px;
        }

        .skin-img {
            width: 50px;
            height: 50px;
            background: #15151a;
            border: 1px solid #333;
            border-radius: 6px;
            image-rendering: pixelated;
            object-fit: contain;
        }
        .top-1 .skin-img { width: 60px; height: 60px; border-color: var(--gold); }

        .player-meta { display: flex; flex-direction: column; }
        .player-name { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .player-record { font-size: 0.8rem; color: #00ff66; font-weight: 700; margin-top: 2px; letter-spacing: 0.5px; }

        /* COMPATIBILITY STAMPS (キット別勝点) */
        .stamps-box {
            display: flex;
            gap: 12px;
            margin-left: auto;
            margin-right: 40px;
        }
        .tier-stamp {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 900;
            transition: 0.3s;
        }
        .STAMP-WIN { background: var(--lt-grad); box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3); color: #fff; }
        .STAMP-ZERO { background: #1a1a24; color: #555; border: 1px solid #222; }

        .score-box {
            text-align: right;
            min-width: 160px;
        }
        .score-label { font-size: 0.7rem; color: #555; letter-spacing: 1px; }
        .score-value { font-size: 1.6rem; font-weight: 900; color: var(--accent); }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .logo-area, .nav-btn span, .settings-area { display: none; }
            .main-container { margin-left: 80px; padding: 30px; }
            .stamps-box { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">MCsyaberu's PVP</div>
        <button class="nav-btn active" onclick="changeCategory('Overall')"><span>OVERALL</span></button>
        <button class="nav-btn" onclick="changeCategory('Sword')"><span>SWORD</span></button>
        <button class="nav-btn" onclick="changeCategory('Axe')"><span>AXE</span></button>
        <button class="nav-btn" onclick="changeCategory('Bow')"><span>BOW</span></button>
        <button class="nav-btn" onclick="changeCategory('UHC')"><span>UHC</span></button>

        <div class="settings-area">
            <span class="settings-label">SYSTEM VOLUME</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
            <button class="mute-toggle" id="muteToggle" onclick="toggleMute()">Mute OFF</button>
        </div>
    </div>

    <div class="main-container">
        <div class="header-section">
            <h1 id="viewTitle">Overall Rankings</h1>
        </div>
        <div class="ranking-list" id="rankTable">
            <!-- JavaScriptで動的ロード -->
        </div>
    </div>

    <audio id="snd-switch" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-top" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="data.js"></script>
    <script>
        // data.jsがない場合のデフォルト
        const playersData = window.players || [];

        let currentCat = 'Overall';
        let isMuted = localStorage.getItem('pvp_muted') === 'true';
        let vol = localStorage.getItem('pvp_vol') || 0.5;

        const volInput = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteToggle');
        volInput.value = vol;
        if(isMuted) muteBtn.classList.add('active'), muteBtn.innerText = "Mute ON";

        function playSound(id) {
            if(isMuted) return;
            const s = document.getElementById(id);
            if (!s) return;
            s.volume = vol;
            s.currentTime = 0;
            s.play().catch(() => {});
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('pvp_muted', isMuted);
            muteBtn.classList.toggle('active');
            muteBtn.innerText = isMuted ? "Mute ON" : "Mute OFF";
        }

        volInput.addEventListener('input', (e) => {
            vol = e.target.value;
            localStorage.setItem('pvp_vol', vol);
        });

        function changeCategory(cat) {
            if(cat === currentCat) return;
            currentCat = cat;
            playSound('snd-switch');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.trim() === cat.toUpperCase()) b.classList.add('active');
            });
            document.getElementById('viewTitle').innerText = `${cat} Rankings`;
            
            renderTable();
        }

        // 2人の特定キットにおける勝敗判定 (2:勝ち, 1:引き分け, 0:負け)
        function getMatchPoints(p1, p2, kit) {
            const p1HasP2 = p1.beatenByKit?.[kit]?.includes(p2.name);
            const p2HasP1 = p2.beatenByKit?.[kit]?.includes(p1.name);

            if (p1HasP2 && !p2HasP1) return 2; // p1の勝ち
            if (p2HasP1 && !p1HasP2) return 0; // p1の負け
            return 1; // 引き分け (両方倒している、または両方倒していない)
        }

        // 指定カテゴリにおけるプレイヤーの総合戦績（勝点・勝・分・敗）を計算
        function calculateRecord(player, cat) {
            let wins = 0, draws = 0, losses = 0, totalPoints = 0;
            const kits = (cat === 'Overall') ? ['sword', 'axe', 'bow', 'uhc'] : [cat.toLowerCase()];

            playersData.forEach(other => {
                if (other.name === player.name) return;

                kits.forEach(k => {
                    const pts = getMatchPoints(player, other, k);
                    totalPoints += pts;
                    if (pts === 2) wins++;
                    else if (pts === 1) draws++;
                    else if (pts === 0) losses++;
                });
            });

            return { wins, draws, losses, points: totalPoints };
        }

        function renderTable() {
            const list = document.getElementById('rankTable');
            list.innerHTML = '';
            
            let data = [...playersData];

            // 相性レーティング・ソートアルゴリズム
            data.sort((userX, userY) => {
                const recX = calculateRecord(userX, currentCat);
                const recY = calculateRecord(userY, currentCat);

                // ① 総相性ポイント(Match Points)の比較
                if (recX.points !== recY.points) return recY.points - recX.points;

                // ② 直接対決のタイブレークポイント
                let h2hX = 0, h2hY = 0;
                const kits = (currentCat === 'Overall') ? ['sword', 'axe', 'bow', 'uhc'] : [currentCat.toLowerCase()];
                kits.forEach(k => {
                    h2hX += getMatchPoints(userX, userY, k);
                    h2hY += getMatchPoints(userY, userX, k);
                });
                if (h2hX !== h2hY) return h2hY - h2hX;

                // ③ 共通の対戦相手に対する相性の優劣比較 (ユーザー指定のCさんロジック)
                let betterCountX = 0, betterCountY = 0;
                playersData.forEach(z => {
                    if (z.name === userX.name || z.name === userY.name) return;
                    kits.forEach(k => {
                        const ptsXz = getMatchPoints(userX, z, k);
                        const ptsYz = getMatchPoints(userY, z, k);
                        if (ptsXz > ptsYz) betterCountX++; // Xの方がZに対して良い結果を出している
                        if (ptsYz > ptsXz) betterCountY++; // Yの方がZに対して良い結果を出している
                    });
                });
                if (betterCountX !== betterCountY) return betterCountY - betterCountX;

                // ④ 最終タイブレーク: 名前のアルファベット順
                return userX.name.localeCompare(userY.name);
            });

            // レンダリング処理
            data.forEach((p, i) => {
                const rank = i + 1;
                const isTop3 = rank <= 3;
                const rec = calculateRecord(p, currentCat);
                
                if(isTop3) setTimeout(() => playSound('snd-top'), i * 150);

                const card = document.createElement('div');
                card.className = `player-card ${isTop3 ? 'top-' + rank : ''}`;
                
                // 各Kit個別の勝点をミニスタンプに反映
                let stamps = '';
                ['sword', 'axe', 'bow', 'uhc'].forEach(k => {
                    const kRec = calculateRecord(p, k.toUpperCase());
                    const stampType = kRec.points > 0 ? 'STAMP-WIN' : 'STAMP-ZERO';
                    
                    const isActive = (currentCat === 'Overall' || currentCat.toLowerCase() === k);
                    const activeStyle = isActive ? '' : 'opacity:0.15; transform:scale(0.9);';
                    
                    stamps += `
                        <div class="tier-stamp ${stampType}" style="${activeStyle}">
                            <span>${k.toUpperCase()}</span>
                            <span style="font-size:0.9rem">${kRec.points}P</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    ${rank === 1 ? '<div class="crown-icon">👑</div>' : ''}
                    <div class="rank-number">#${rank}</div>
                    <div class="profile-box">
                        <img src="skins/${p.name}.png" class="skin-img" onerror="this.src='https://minotar.net/helm/${p.name}/32'">
                        <div class="player-meta">
                            <span class="player-name">${p.name}</span>
                            <span class="player-record">${rec.wins}勝 - ${rec.draws}分 - ${rec.losses}敗</span>
                        </div>
                    </div>
                    <div class="stamps-box">${stamps}</div>
                    <div class="score-box">
                        <div class="score-label">${currentCat.toUpperCase()} MATCH POINTS</div>
                        <div class="score-value">${rec.points} PTS</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
